services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_USE_WHITENOISE: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DATA_DIR: /data
    volumes:
      - warecon_data:/data
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "manage.py", "rqworker", "default"]
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DATA_DIR: /data
    volumes:
      - warecon_data:/data
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  redis_data:
  warecon_data:
