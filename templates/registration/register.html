{% extends "base.html" %}
{% block title %}Kayıt{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card">
      <div class="card-header"><h3 class="card-title">Kayıt Ol</h3></div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary w-100 mt-2">Kayıt Ol</button>
        </form>
        <p class="text-secondary small mt-3 mb-0 text-center">
          Zaten hesabınız var mı? <a href="{% url 'scans:login' %}">Giriş yapın</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
